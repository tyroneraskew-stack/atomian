[build]
  command = "echo 'Proxy configuration — no build step required'"
  publish = "dist"

# Proxy every request on atomian.co.za to the upstream Skywork preview so
# the live site mirrors that URL in real time. `force = true` ensures the
# proxy takes precedence over the static fallback in `dist/`.
[[redirects]]
  from = "/*"
  to = "https://vpig86375e.skywork.website/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
