[build]
  command = "mkdir -p dist && { [ -s dist/_redirects ] || printf '/*  https://vpig86375e.skywork.website/:splat  200!\\n' > dist/_redirects; } && { [ -s dist/index.html ] || printf '<!DOCTYPE html><meta http-equiv=\"refresh\" content=\"0;url=https://vpig86375e.skywork.website/\"><title>Atomian Wellness</title>' > dist/index.html; }"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "https://vpig86375e.skywork.website/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
